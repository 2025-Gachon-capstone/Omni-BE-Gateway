    urls[2]:
      name: Omni-BE-Payment
      url: https://${HTTPS_GATEWAY_URL}/omni-be-payment/v3/api-docs
    urls[3]:
      name: Omni-BE-Card
      url: https://${HTTPS_GATEWAY_URL}/omni-be-card/v3/api-docs
    urls[4]:
      name: Omni-BE-File
      url: https://${HTTPS_GATEWAY_URL}/omni-be-file/v3/api-docs
